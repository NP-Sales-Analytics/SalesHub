<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nippon Paint - SalesHub</title>
  <link rel="icon" href="Nippon-Paint-Favicon.png" type="image/png">
  <style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: sans-serif;
  }
  .iframe-container {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh; /* ★ fallback-aware: browser lama pakai 100vh, browser baru pakai 100dvh */
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.2rem;
    color: #666;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbyHTpcBM5FPtMDFYOVWwcTySJmTtgqyVxb3P0h32wcItMHUS9AGOSVxHoLXIF_NWmkn/exec" 
      title="SalesHub Web App"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
